name: Feature request
description: Suggest an improvement for CmdIME.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow friction should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention any workaround or app you compared against.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Input source matching
        - Shortcut binding
        - Single or double tap modifiers
        - Settings UI
        - Menu bar behavior
        - Packaging or install
        - Documentation
        - Other
    validations:
      required: true
